[workspace]
members = [
    "crates/oxidepdf-core",
    "crates/oxidepdf-cli",
]
resolver = "2"

[workspace.package]
edition = "2021"
license = "MIT OR Apache-2.0"
rust-version = "1.80"

[workspace.dependencies]
clap = { version = "4.5.40", features = ["derive"] }
oxidepdf-core = { path = "crates/oxidepdf-core" }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
serde_yaml = "0.9.34"
thiserror = "2.0.17"
lopdf = { version = "0.36.0", default-features = false }
assert_cmd = "2.1.1"
predicates = "3.1.3"
