[workspace]
members = [
    "crates/oxidepdf-core",
    "crates/oxidepdf-cli",
]
resolver = "2"

[workspace.package]
edition = "2021"
license = "MIT OR Apache-2.0"
rust-version = "1.80"

[workspace.dependencies]
clap = { version = "4.5.40", features = ["derive"] }
oxidepdf-core = { path = "crates/oxidepdf-core" }
